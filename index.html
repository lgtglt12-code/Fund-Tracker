<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Fund Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5 md:p-10">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-gray-800 mb-8 text-center border-b pb-4">Project Fund Tracker</h1>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-blue-500">
                <p class="text-sm text-gray-500 uppercase font-bold">Total Balance</p>
                <p id="totalBalance" class="text-2xl font-mono font-bold text-gray-800">$0.00</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-green-500">
                <p class="text-sm text-gray-500 uppercase font-bold text-green-600">Total Revenue</p>
                <p id="totalRevenue" class="text-2xl font-mono font-bold text-green-600">$0.00</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-red-500">
                <p class="text-sm text-gray-500 uppercase font-bold text-red-600">Total Costs</p>
                <p id="totalCost" class="text-2xl font-mono font-bold text-red-600">$0.00</p>
            </div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-sm mb-8">
            <form id="transactionForm" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <input type="text" id="description" placeholder="Description (e.g., Sponsorship)" class="border p-2 rounded w-full" required>
                <input type="number" id="amount" placeholder="Amount" step="0.01" class="border p-2 rounded w-full" required>
                <select id="type" class="border p-2 rounded w-full">
                    <option value="revenue">Revenue (+)</option>
                    <option value="cost">Cost (-)</option>
                </select>
                <button type="submit" class="bg-indigo-600 text-white p-2 rounded font-bold hover:bg-indigo-700 transition">Add Entry</button>
            </form>
        </div>

        <div class="bg-white rounded-xl shadow-sm overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-50 border-b">
                    <tr>
                        <th class="p-4 font-semibold text-gray-600">Description</th>
                        <th class="p-4 font-semibold text-gray-600">Type</th>
                        <th class="p-4 font-semibold text-gray-600">Amount</th>
                        <th class="p-4 font-semibold text-gray-600 text-right">Action</th>
                    </tr>
                </thead>
                <tbody id="transactionList">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        let transactions = JSON.parse(localStorage.getItem('project_funds')) || [];

        const form = document.getElementById('transactionForm');
        const list = document.getElementById('transactionList');

        function updateUI() {
            list.innerHTML = '';
            let revenue = 0;
            let costs = 0;

            transactions.forEach((t, index) => {
                const isRevenue = t.type === 'revenue';
                if (isRevenue) revenue += t.amount;
                else costs += t.amount;

                const row = document.createElement('tr');
                row.className = "border-b hover:bg-gray-50 transition";
                row.innerHTML = `
                    <td class="p-4">${t.description}</td>
                    <td class="p-4"><span class="px-2 py-1 rounded text-xs font-bold uppercase ${isRevenue ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${t.type}</span></td>
                    <td class="p-4 font-mono ${isRevenue ? 'text-green-600' : 'text-red-600'}">${isRevenue ? '+' : '-'}$${t.amount.toFixed(2)}</td>
                    <td class="p-4 text-right"><button onclick="deleteTransaction(${index})" class="text-red-400 hover:text-red-600">✕</button></td>
                `;
                list.appendChild(row);
            });

            document.getElementById('totalRevenue').innerText = `$${revenue.toFixed(2)}`;
            document.getElementById('totalCost').innerText = `$${costs.toFixed(2)}`;
            document.getElementById('totalBalance').innerText = `$${(revenue - costs).toFixed(2)}`;
            
            localStorage.setItem('project_funds', JSON.stringify(transactions));
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const newTransaction = {
                description: document.getElementById('description').value,
                amount: parseFloat(document.getElementById('amount').value),
                type: document.getElementById('type').value
            };
            transactions.push(newTransaction);
            form.reset();
            updateUI();
        });

        function deleteTransaction(index) {
            transactions.splice(index, 1);
            updateUI();
        }

        updateUI(); // Initial Load
    </script>
</body>
</html>
