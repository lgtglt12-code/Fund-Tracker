<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fund Tracker</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #141e30, #243b55);
    color: #fff;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .container {
    width: 90%;
    max-width: 900px;
    background: rgba(255,255,255,0.08);
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    backdrop-filter: blur(10px);
  }

  h1 {
    text-align: center;
    margin-bottom: 20px;
  }

  input, select {
    padding: 10px;
    margin: 5px;
    border-radius: 6px;
    border: none;
    outline: none;
  }

  button {
    padding: 10px 15px;
    background: #00c6ff;
    border: none;
    color: white;
    border-radius: 6px;
    cursor: pointer;
  }

  button:hover {
    background: #0072ff;
  }

  table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
    background: white;
    color: black;
    border-radius: 10px;
    overflow: hidden;
  }

  th, td {
    padding: 10px;
    text-align: center;
    border-bottom: 1px solid #ddd;
  }

  th {
    background: #243b55;
    color: white;
  }

  .delete {
    background: red;
    border: none;
    padding: 5px 10px;
    color: white;
    border-radius: 5px;
    cursor: pointer;
  }

  .balance {
    margin-top: 15px;
    font-size: 22px;
    text-align: right;
    font-weight: bold;
  }
</style>
</head>

<body>

<div class="container">
  <h1>💰 Fund Tracker</h1>

  <input type="date" id="date">
  <input type="text" id="desc" placeholder="Description">

  <select id="type">
    <option value="revenue">Revenue</option>
    <option value="cost">Cost</option>
  </select>

  <input type="number" id="amount" placeholder="Amount">
  <button onclick="addData()">Add</button>

  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Description</th>
        <th>Revenue</th>
        <th>Cost</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

  <div class="balance">
    Balance: <span id="balance">0</span>
  </div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("fundData")) || [];

function save() {
  localStorage.setItem("fundData", JSON.stringify(data));
}

function render() {
  let table = document.getElementById("tableBody");
  table.innerHTML = "";

  let balance = 0;

  data.forEach((item, index) => {
    let revenue = "";
    let cost = "";

    if (item.type === "revenue") {
      revenue = item.amount;
      balance += item.amount;
    } else {
      cost = item.amount;
      balance -= item.amount;
    }

    table.innerHTML += `
      <tr>
        <td>${item.date}</td>
        <td>${item.desc}</td>
        <td>${revenue}</td>
        <td>${cost}</td>
        <td><button class="delete" onclick="removeItem(${index})">Delete</button></td>
      </tr>
    `;
  });

  document.getElementById("balance").innerText = balance;
}

function addData() {
  let date = document.getElementById("date").value;
  let desc = document.getElementById("desc").value;
  let type = document.getElementById("type").value;
  let amount = Number(document.getElementById("amount").value);

  if (!date || !desc || !amount) {
    alert("Fill all fields");
    return;
  }

  data.push({ date, desc, type, amount });
  save();
  render();

  document.getElementById("desc").value = "";
  document.getElementById("amount").value = "";
}

function removeItem(index) {
  data.splice(index, 1);
  save();
  render();
}

render();
</script>

</body>

<body>

<h1>💰 Fund Tracker</h1>

<div class="container">
  <input type="date" id="date">
  <input type="text" id="desc" placeholder="Description">

  <select id="type">
    <option value="revenue">Revenue</option>
    <option value="cost">Cost</option>
  </select>

  <input type="number" id="amount" placeholder="Amount">
  <button onclick="addTransaction()">Add</button>

  <table id="table">
    <tr>
      <th>Date</th>
      <th>Description</th>
      <th>Revenue</th>
      <th>Cost</th>
      <th>Action</th>
    </tr>
  </table>

  <div class="balance">
    Balance: <span id="balance">0</span>
  </div>
</div>

<script>
let transactions = JSON.parse(localStorage.getItem("data")) || [];
let balance = 0;

function saveData() {
  localStorage.setItem("data", JSON.stringify(transactions));
}

function renderTable() {
  let table = document.getElementById("table");

  table.innerHTML = `
    <tr>
      <th>Date</th>
      <th>Description</th>
      <th>Revenue</th>
      <th>Cost</th>
      <th>Action</th>
    </tr>
  `;

  balance = 0;

  transactions.forEach((t, index) => {
    let row = table.insertRow();

    let rev = t.type === "revenue" ? t.amount : "";
    let cost = t.type === "cost" ? t.amount : "";

    if (t.type === "revenue") balance += t.amount;
    else balance -= t.amount;

    row.insertCell(0).innerText = t.date;
    row.insertCell(1).innerText = t.desc;
    row.insertCell(2).innerText = rev;
    row.insertCell(3).innerText = cost;

    let actionCell = row.insertCell(4);
    actionCell.innerHTML = `
      <button class="delete-btn" onclick="deleteTransaction(${index})">Delete</button>
    `;
  });

  document.getElementById("balance").innerText = balance;
}

function addTransaction() {
  let date = document.getElementById("date").value;
  let desc = document.getElementById("desc").value;
  let type = document.getElementById("type").value;
  let amount = Number(document.getElementById("amount").value);

  if (!date || !desc || !amount) {
    alert("Please fill all fields");
    return;
  }

  transactions.push({ date, desc, type, amount });
  saveData();
  renderTable();

  document.getElementById("desc").value = "";
  document.getElementById("amount").value = "";
}

function deleteTransaction(index) {
  transactions.splice(index, 1);
  saveData();
  renderTable();
}

// initial load
renderTable();
</script>
