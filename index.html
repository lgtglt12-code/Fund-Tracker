<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hope Bridge | Fund Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif;
            background-image: linear-gradient(rgba(248, 250, 252, 0.92), rgba(248, 250, 252, 0.92)), url('background.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 text-slate-800">

    <div class="max-w-5xl mx-auto">
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-10 gap-6">
            <div class="flex items-center gap-4">
                <img src="logo.png" alt="Logo" class="w-16 h-16 rounded-xl shadow-md object-cover bg-white" onerror="this.src='https://ui-avatars.com/api/?name=Hope+Bridge&background=4F46E5&color=fff'">
                <div>
                    <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">Hope Bridge</h1>
                    <p class="text-indigo-600 font-bold uppercase tracking-widest text-xs">Project Fund Tracker</p>
                </div>
            </div>
            
            <div class="flex items-center glass-card px-4 py-2 rounded-full shadow-sm border border-slate-200">
                <span class="relative flex h-3 w-3 mr-3">
                    <span id="pingDot" class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span id="statusDot" class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                </span>
                <span class="text-sm font-semibold text-slate-600 uppercase tracking-wider" id="syncStatus">Syncing...</span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="glass-card p-6 rounded-2xl shadow-lg border-t-4 border-t-slate-500">
                <p class="text-xs font-bold text-slate-400 uppercase mb-2">Net Balance</p>
                <span id="totalBalance" class="text-3xl font-bold text-slate-900 font-mono">Rs. 0.00</span>
            </div>

            <div class="glass-card p-6 rounded-2xl shadow-lg border-t-4 border-t-emerald-500 text-emerald-600">
                <p class="text-xs font-bold uppercase mb-2">Total Revenue</p>
                <span id="totalRevenue" class="text-3xl font-bold font-mono">Rs. 0.00</span>
            </div>

            <div class="glass-card p-6 rounded-2xl shadow-lg border-t-4 border-t-rose-500 text-rose-600">
                <p class="text-xs font-bold uppercase mb-2">Total Costs</p>
                <span id="totalCost" class="text-3xl font-bold font-mono">Rs. 0.00</span>
            </div>
        </div>

        <div class="glass-card rounded-2xl shadow-xl overflow-hidden border border-slate-200">
            <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-white/50">
                <h3 class="font-bold text-indigo-900 tracking-tight text-lg uppercase">Financial Ledger (LKR)</h3>
                <button onclick="fetchData()" class="text-xs font-bold bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 transition uppercase shadow-md active:scale-95">
                    Refresh
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="text-slate-400 text-xs uppercase font-bold tracking-widest bg-slate-50/50">
                            <th class="px-6 py-4">Item Description</th>
                            <th class="px-6 py-4 text-center">Classification</th>
                            <th class="px-6 py-4 text-right">Amount (Rs.)</th>
                        </tr>
                    </thead>
                    <tbody id="transactionList" class="divide-y divide-slate-100 text-slate-700">
                        <tr><td colspan="3" class="px-6 py-10 text-center text-slate-400 italic">Connecting to Hope Bridge Database...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <div class="text-center mt-12 mb-8 text-slate-500 text-sm font-medium">
            <p>&copy; 2026 <span class="font-bold text-indigo-600 tracking-wide uppercase">Hope Bridge</span> | University Project</p>
        </div>
    </div>

    <script>
        // THE SPECIFIC NEW LINK
        const csvUrl = https://docs.google.com/spreadsheets/d/e/2PACX-1vSxCmM-pnye0gF-Oop2Aof_BLQ24Y3zVb9GZhDaIJlKYdiW6AOW9uFL4ZK1I3vRtUSd02pFrkMR7Nnp/pubhtml

        async function fetchData() {
            const statusEl = document.getElementById('syncStatus');
            const ping = document.getElementById('pingDot');
            const dot = document.getElementById('statusDot');

            try {
                // Add timestamp to prevent browser from showing old data
                const response = await fetch(`${csvUrl}&t=${new Date().getTime()}`);
                if (!response.ok) throw new Error();
                
                const data = await response.text();
                const rows = data.split('\n').slice(1);

                const transactions = rows.map(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length < 3) return null;
                    return {
                        desc: cols[0].replace(/"/g, '').trim(),
                        amount: parseFloat(cols[1]),
                        type: cols[2].trim().toLowerCase()
                    };
                }).filter(t => t !== null && !isNaN(t.amount));

                updateUI(transactions);
                
                statusEl.innerText = "Live Sync Active";
                dot.className = "relative inline-flex rounded-full h-3 w-3 bg-emerald-500";
                ping.style.display = "block";
            } catch (e) {
                statusEl.innerText = "Sync Error";
                dot.className = "relative inline-flex rounded-full h-3 w-3 bg-rose-500";
                ping.style.display = "none";
            }
        }

        function formatLKR(val) {
            return "Rs. " + val.toLocaleString('en-LK', { minimumFractionDigits: 2 });
        }

        function updateUI(data) {
            const list = document.getElementById('transactionList');
            list.innerHTML = '';
            let rev = 0; let cost = 0;

            data.forEach(item => {
                const isRev = item.type === 'revenue';
                isRev ? rev += item.amount : cost += item.amount;

                const row = `
                    <tr class="hover:bg-white/60 transition-colors">
                        <td class="px-6 py-4 font-semibold text-slate-800">${item.desc}</td>
                        <td class="px-6 py-4 text-center">
                            <span class="inline-flex items-center px-3 py-1 rounded-full text-[10px] font-black tracking-widest ${isRev ? 'bg-emerald-100 text-emerald-700' : 'bg-rose-100 text-rose-700'}">
                                ${item.type.toUpperCase()}
                            </span>
                        </td>
                        <td class="px-6 py-4 text-right font-mono font-bold ${isRev ? 'text-emerald-600' : 'text-rose-600'}">
                            ${isRev ? '+' : '-'}${item.amount.toLocaleString(undefined, {minimumFractionDigits: 2})}
                        </td>
                    </tr>`;
                list.insertAdjacentHTML('beforeend', row);
            });

            document.getElementById('totalRevenue').innerText = formatLKR(rev);
            document.getElementById('totalCost').innerText = formatLKR(cost);
            
            const bal = rev - cost;
            const balEl = document.getElementById('totalBalance');
            balEl.innerText = formatLKR(bal);
            balEl.className = `text-3xl font-bold font-mono ${bal >= 0 ? 'text-emerald-600' : 'text-rose-600'}`;
        }

        fetchData();
        setInterval(fetchData, 30000); // 30-second auto-update
    </script>
</body>
</html>
